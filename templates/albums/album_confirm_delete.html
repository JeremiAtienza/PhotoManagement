{% extends 'base.html' %}

{% block title %}Delete Album | PhotoFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card p-4">
            <h1 class="h3 mb-3">Delete album</h1>
            <p class="mb-4">Are you sure you want to delete <strong>{{ object.title }}</strong>? This will remove the album and all related photos from the system.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button class="btn btn-danger" type="submit">Delete</button>
                    <a class="btn btn-outline-light" href="{% url 'album_detail' object.pk %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
