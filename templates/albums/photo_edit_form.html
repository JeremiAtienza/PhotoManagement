{% extends 'base.html' %}

{% block title %}Edit Photo Metadata | PhotoFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-4">
            <h1 class="h3 mb-3">Edit photo metadata</h1>
            <p class="small-muted mb-4">Update captions, sharing visibility, and moderation details for this image.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Save changes</button>
                    <a class="btn btn-outline-light" href="{% url 'album_detail' object.album_id %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
